<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseGuard Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 1); }
            50% { background-color: rgba(239, 68, 68, 0.6); border-color: rgba(220, 38, 38, 1); }
        }
        .critical-pulse {
            animation: pulse-red 1.5s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4 antialiased">

    <!-- Micro-App Wrapper -->
    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-2xl space-y-6 relative overflow-hidden">
        
        <!-- Header -->
        <div class="flex justify-between items-center border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-emerald-400">PulseGuard</h1>
                <p class="text-xs text-gray-400">Predictive Token Early Warning System</p>
            </div>
            <span class="px-2.5 py-1 text-xs font-semibold bg-gray-800 rounded-full text-gray-300 border border-gray-700">Predictive Engine v1.0</span>
        </div>

        <!-- Global Alert Banner -->
        <div id="alertBanner" class="hidden p-4 rounded-xl border flex flex-col gap-1 transition-all duration-300">
            <span id="alertTitle" class="font-bold text-sm tracking-wide"></span>
            <span id="alertDesc" class="text-xs opacity-90"></span>
        </div>

        <!-- DUAL INTERFACE DISPLAY -->
        <div class="flex flex-col items-center justify-center space-y-4 py-2">
            <!-- Interface 1: The Visual Fuel Gauge Dial -->
            <div class="relative w-44 h-44 flex items-center justify-center">
                <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" stroke="#1f2937" stroke-width="8" fill="transparent" />
                    <circle id="gaugeProgress" cx="50" cy="50" r="40" stroke="#10b981" stroke-width="8" fill="transparent" 
                            stroke-dasharray="251.2" stroke-dashoffset="0" stroke-linecap="round" class="transition-all duration-500"/>
                </svg>
                <div class="absolute flex flex-col items-center text-center">
                    <span id="displayUnits" class="text-3xl font-extrabold tracking-tight">50.0</span>
                    <span class="text-[10px] text-gray-400 font-medium uppercase tracking-widest mt-0.5">Est. Units Left</span>
                </div>
            </div>

            <!-- Interface 2: The Days Remaining Text Dashboard -->
            <div class="text-center space-y-1">
                <div id="countdownText" class="text-2xl font-bold tracking-tight text-white">
                    ~ 12.5 Days Remaining
                </div>
                <p class="text-xs text-gray-500">Based on dynamic consumption tracking</p>
            </div>
        </div>

        <!-- Metrics Overview Matrix -->
        <div class="grid grid-cols-2 gap-3 bg-gray-950/50 p-3.5 rounded-2xl border border-gray-800/60">
            <div class="text-center border-r border-gray-800 p-1">
                <span class="block text-[10px] text-gray-500 uppercase font-semibold tracking-wider">Daily Usage Rate</span>
                <span id="metricUsage" class="text-base font-bold text-gray-200">4.0 Units/Day</span>
            </div>
            <div class="text-center p-1">
                <span class="block text-[10px] text-gray-500 uppercase font-semibold tracking-wider">Alert Threshold</span>
                <span class="text-base font-bold text-red-400">5.0 Units</span>
            </div>
        </div>

        <!-- INTERACTIVE CONTROLS (THE SIMULATION ENGINE) -->
        <div class="space-y-4 bg-gray-950/40 p-4 rounded-2xl border border-gray-800/80">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Simulation Panel</h3>
            
            <!-- Quick Load Actions -->
            <div class="grid grid-cols-2 gap-2">
                <button onclick="simulateReload(30)" class="py-2 px-3 text-xs font-medium bg-emerald-950/40 border border-emerald-800/60 text-emerald-400 rounded-xl hover:bg-emerald-900/30 transition">
                    + Load 30 Units
                </button>
                <button onclick="simulateReload(60)" class="py-2 px-3 text-xs font-medium bg-blue-950/40 border border-blue-800/60 text-blue-400 rounded-xl hover:bg-blue-900/30 transition">
                    + Load 60 Units
                </button>
            </div>

            <!-- Manual Burn Rate Sliders -->
            <div class="space-y-2">
                <div class="flex justify-between text-xs">
                    <span class="text-gray-400">Adjust Daily Drain Rate:</span>
                    <span id="drainLabel" class="text-emerald-400 font-semibold">4.0 U/day</span>
                </div>
                <input id="drainSlider" type="range" min="1" max="15" step="0.5" value="4" oninput="updateDrainRate(this.value)"
                       class="w-full h-1.5 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
            </div>

            <!-- Fast Forward Button -->
            <button onclick="fastForwardDay()" class="w-full py-2.5 px-4 bg-gray-800 hover:bg-gray-700 text-gray-200 font-medium text-xs rounded-xl border border-gray-700 shadow-sm transition flex items-center justify-center gap-1.5">
                ⏩ Simulate Passing of 1 Day
            </button>
        </div>
    </div>

    <!-- Core Business Logic Script -->
    <script>
        // System State Variables
        let currentUnits = 50.0;
        let dailyDrainRate = 4.0;
        const alertThreshold = 5.0;
        const maxGaugeUnits = 100.0; // Benchmark cap for visualization scaling

        function updateUI() {
            // Ensure numbers stay bounded
            if (currentUnits < 0) currentUnits = 0;

            // Update numerical readouts
            document.getElementById('displayUnits').innerText = currentUnits.toFixed(1);
            document.getElementById('metricUsage').innerText = `${dailyDrainRate.toFixed(1)} Units/Day`;
            
            // Calculate remaining duration
            const daysRemaining = currentUnits / dailyDrainRate;
            document.getElementById('countdownText').innerText = `~ ${daysRemaining.toFixed(1)} Days Remaining`;

            // Update SVGGauge Ring
            const circle = document.getElementById('gaugeProgress');
            const circumference = 2 * Math.PI * 40; // ~251.2
            const percentage = Math.min(currentUnits / maxGaugeUnits, 1);
            const strokeDashoffset = circumference - (percentage * circumference);
            circle.style.strokeDasharray = circumference;
            circle.style.strokeDashoffset = strokeDashoffset;

            // Handle States and Contextual Alerts
            const banner = document.getElementById('alertBanner');
            const title = document.getElementById('alertTitle');
            const desc = document.getElementById('alertDesc');

            if (currentUnits <= 0) {
                // Blackout State
                circle.setAttribute('stroke', '#ef4444');
                banner.className = "p-4 rounded-xl border critical-pulse text-red-400 border-red-600";
                title.innerText = "🛑 BLACKOUT EMERGENCY";
                desc.innerText = "Estimated balance hits 0 units. Purchase immediate tokens to restore calculations.";
                banner.classList.remove('hidden');
            } else if (currentUnits <= alertThreshold) {
                // Critical Early Warning Stage (<= 5 Units)
                circle.setAttribute('stroke', '#f59e0b');
                banner.className = "p-4 rounded-xl border bg-amber-950/40 text-amber-400 border-amber-800/80";
                title.innerText = "⚠️ ACTION REQUIRED: RECHARGE NOW";
                desc.innerText = `Critically low! You are down to ${currentUnits.toFixed(1)} units (~${daysRemaining.toFixed(1)} days left). Purchase tokens immediately before structural shutdown.`;
                banner.classList.remove('hidden');
            } else {
                // Safe Mode
                circle.setAttribute('stroke', '#10b981');
                banner.classList.add('hidden');
            }
        }

        function fastForwardDay() {
            currentUnits -= dailyDrainRate;
            updateUI();
        }

        function simulateReload(amount) {
            currentUnits += amount;
            updateUI();
        }

        function updateDrainRate(val) {
            dailyDrainRate = parseFloat(val);
            document.getElementById('drainLabel').innerText = `${dailyDrainRate.toFixed(1)} U/day`;
            updateUI();
        }

        // Trigger Initial Rendering Boot
        updateUI();
    </script>
</body>
</html>
